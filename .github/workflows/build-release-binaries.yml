name: build-release-binaries

on:
  push:
    branches: [main]
    paths:
      - 'codex-rs/**'
      - '.github/workflows/build-release-binaries.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            bin: codex
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            bin: codex
          - target: x86_64-apple-darwin
            os: macos-latest
            bin: codex
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: codex
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            codex-rs/target
          key: ${{ matrix.target }}-release-${{ hashFiles('codex-rs/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-release-

      - name: Build release binary
        working-directory: codex-rs
        run: cargo build --release --target ${{ matrix.target }} -p codex-cli

      - name: Strip binary
        working-directory: codex-rs
        run: strip target/${{ matrix.target }}/release/${{ matrix.bin }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codex-${{ matrix.target }}
          path: codex-rs/target/${{ matrix.target }}/release/${{ matrix.bin }}
          retention-days: 30
