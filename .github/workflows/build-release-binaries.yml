name: build-release-binaries

on:
  push:
    branches: [main]
    paths:
      - 'codex-rs/**'
      - '.github/workflows/build-release-binaries.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
      CARGO_PROFILE_RELEASE_DEBUG: 0
      CARGO_PROFILE_RELEASE_STRIP: "symbols"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install mold + musl-tools
        run: sudo apt-get install -y mold musl-tools

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: ./.github/actions/setup-rusty-v8
        with:
          target: x86_64-unknown-linux-musl

      - run: echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"

      # Full target/ cache: on hit, only workspace crates recompile (~1 min).
      # Keyed on Cargo.lock so dep changes bust the cache.
      - name: Cache build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            codex-rs/target/x86_64-unknown-linux-musl/release/.fingerprint
            codex-rs/target/x86_64-unknown-linux-musl/release/build
            codex-rs/target/x86_64-unknown-linux-musl/release/deps
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: build-${{ hashFiles('codex-rs/Cargo.lock') }}-${{ hashFiles('codex-rs/**/src/**/*.rs') }}
          restore-keys: |
            build-${{ hashFiles('codex-rs/Cargo.lock') }}-
            build-

      - name: Build
        working-directory: codex-rs
        run: |
          cargo build --release --target x86_64-unknown-linux-musl -p codex-cli \
            --config target.x86_64-unknown-linux-musl.linker='"clang"' \
            --config target.x86_64-unknown-linux-musl.rustflags='["-C","link-arg=-fuse-ld=mold"]'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codex-x86_64-unknown-linux-musl
          path: codex-rs/target/x86_64-unknown-linux-musl/release/codex
          retention-days: 30
